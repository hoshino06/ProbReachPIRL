# PIRL scheduling experiment config for randT_replayHJB from 2M.
# Start from an early randT TD3 checkpoint, keep randT reset during scheduling,
# and sample HJB points from the replay buffer.
# Run with:
#   conda activate pirl
#   python scheduling_experiment/run_scheduling_experiment.py --config scheduling_experiment/randT_replayHJB_2Mto10M.toml

[experiment]
baseline_checkpoint = "logs/drift/td3_T01_randT/up02M_scale08_mix334_randT/ckpt-2000000"
rounds = 10
updates_per_round = 1_000_000
target_total_updates = 10_000_000
max_parallel_candidates = 2
learner_num_gpus = 0.16
advisor_command = "codex exec"

# One checkpoint per continuation block and lighter TensorBoard logs.
checkpoint_freq = 1_000_000
log_freq = 5_000

[training_env]
CASE = "drift"
METHOD = "scheduling"
SEEDS = "1"
NUM_WORKERS = 2

DRIFT_DT = 0.1
DRIFT_RESET_SCALE = 1.0
DRIFT_RESET_MODE = "mixture"
DRIFT_RESET_MIXTURE_PROBS = "0.3,0.3,0.4" # beta_r, ey_epsi, full
DRIFT_RESET_T_MODE = "random"
DRIFT_RESET_T_MIN = 0.0
DRIFT_RESET_T_MAX = 5.0

INITIAL_EXPLORATION_POLICY = "policy"
PINN_SAMPLE_MODE = "replay"
PINN_REPLAY_FRACTION = 1.0
PINN_REPLAY_JITTER = 0.0

HJB_LAPLACIAN_MODE = "loop"
SCHEDULE_TIME_BASE = "local"

[evaluation]
T = 5.0
num_grid = 31
num_rollouts = 16
device = "cuda"

[advisor_context]
manual_notes = """
- This is a randT_replayHJB scheduling study from the early 2M randT TD3 checkpoint.
- Treat 10M total updates as the first milestone, not a hard stop; if training remains healthy, continuing toward 12M is acceptable.
- Keep RL weight at 1.0 and compare final reward stability against the TD3 baseline.
- HJB/BDR=0.05 can be tried only after reward and meanMC look stable at smaller weights; 0.05 caused collapse in the 5M-start sweep.
- If average reward decreases monotonically, consider restarting from a safer TD3 or scheduling checkpoint.
- Restart decisions are ambiguous when the degradation is mild. In borderline cases, keep two branches: one continuation branch that tries to recover by extending the current safe checkpoint, and one restart/control branch from a safer checkpoint with reduced or slower HJB/BDR weights.
"""
reference_paths = [
  "logs/drift/README.md",
  "logs/drift/scheduling_randT_replayHJB",
  "logs/drift/td3_T01_randT/",
  "scheduling_experiment/randT_replayHJB_5Mto10M",
]

[initial_plan]
round_note = "Early-start randT replay-HJB sweep from 2M toward the 10M milestone."

[[initial_plan.candidates]]
name = "ramp0to001"
start_checkpoint = ""
schedule_initial = [1.0, 0.0, 0.0]
schedule_final = [1.0, 0.01, 0.01]
schedule_center = 500_000
schedule_sharpness = 0.00001

[[initial_plan.candidates]]
name = "ramp0to0005"
start_checkpoint = ""
schedule_initial = [1.0, 0.0, 0.0]
schedule_final = [1.0, 0.005, 0.005]
schedule_center = 500_000
schedule_sharpness = 0.00001
