# PIRL scheduling experiment config for fixed2randT_uniformHJB.
# Start from a fixedT TD3 checkpoint, switch reset T to random during
# scheduling, and sample HJB points uniformly over the domain.
# Run with:
#   conda activate pirl
#   python scheduling_experiment/run_scheduling_experiment.py --config scheduling_experiment/fixed2randT_uniformHJB_5Mto10M.toml

[experiment]
baseline_checkpoint = "logs/drift/td3_T01/up05M_scale10_mix334/ckpt-5000000"
rounds = 8
updates_per_round = 1_000_000
target_total_updates = 10_000_000
max_parallel_candidates = 2
learner_num_gpus = 0.16
advisor_command = "codex exec"

# One checkpoint per continuation block and lighter TensorBoard logs.
checkpoint_freq = 1_000_000
log_freq = 5_000

[training_env]
CASE = "drift"
METHOD = "scheduling"
SEEDS = "1"
NUM_WORKERS = 2

DRIFT_DT = 0.1
DRIFT_RESET_SCALE = 1.0
DRIFT_RESET_MODE = "mixture"
DRIFT_RESET_MIXTURE_PROBS = "0.3,0.3,0.4" # beta_r, ey_epsi, full
DRIFT_RESET_T_MODE = "random"
DRIFT_RESET_T_MIN = 0.0
DRIFT_RESET_T_MAX = 5.0

INITIAL_EXPLORATION_POLICY = "policy"
PINN_SAMPLE_MODE = "uniform"
PINN_REPLAY_FRACTION = 1.0
PINN_REPLAY_JITTER = 0.0

HJB_LAPLACIAN_MODE = "loop"
SCHEDULE_TIME_BASE = "local"

[evaluation]
T = 5.0
num_grid = 31
num_rollouts = 16
device = "cuda"

[advisor_context]
manual_notes = """
- This matches manual fixed2randT_uniformHJB: fixedT TD3 baseline, randT scheduling reset, uniform HJB samples.
- Compare against fixed2randT_replayHJB to isolate the HJB sampling distribution.
- HJB/BDR=0.05 is a useful manual-style comparison point, but back off if reward or MC reachability degrades.
"""
reference_paths = [
  "logs/drift/README.md",
  "logs/drift/scheduling_randT_replayHJB",
  "logs/drift/scheduling_fixed2randT_uniformHJB",
  "logs/drift/scheduling_fixedT_replayHJB",
  "logs/drift/scheduling_fixedT_uniformHJB",
  "logs/drift/td3_T01_randT/",
  "logs/drift/td3_T01/",
]

[initial_plan]
round_note = "Manual-style sweep from a fixedT TD3 baseline, switching reset T to random and using uniform HJB samples."

[[initial_plan.candidates]]
name = "ramp0to001"
start_checkpoint = ""
schedule_initial = [1.0, 0.0, 0.0]
schedule_final = [1.0, 0.01, 0.01]
schedule_center = 500_000
schedule_sharpness = 0.00001

[[initial_plan.candidates]]
name = "ramp0to005"
start_checkpoint = ""
schedule_initial = [1.0, 0.0, 0.0]
schedule_final = [1.0, 0.05, 0.05]
schedule_center = 500_000
schedule_sharpness = 0.00001
